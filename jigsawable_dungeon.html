<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jigsawable Dungeon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080b; color: #a5a5c0;
    font-family: monospace;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px;
    overflow: hidden;
  }
  #info {
    font-size: 14px; margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  #game-wrap {
    display: flex; gap: 10px; align-items: flex-start;
  }
  #side {
    display: flex; flex-direction: column; gap: 10px;
  }
  canvas {
    border: 1px solid #3a3a55;
    image-rendering: pixelated;
  }
  #minimap {
    border: 1px solid #3a3a55;
  }
  #controls {
    font-size: 12px; line-height: 1.6;
    color: #7a7a9a; border: 1px solid #3a3a55;
    padding: 8px 12px; border-radius: 4px;
  }
  .ctrl-title {
    color: #a5a5c0; font-weight: bold; margin-top: 4px;
  }
  .ctrl-title:first-child { margin-top: 0; }
  .ctrl-row { padding-left: 8px; }

  /* 難易度選択画面 */
  #difficulty-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #08080b;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
  }
  #difficulty-screen h1 {
    color: #a5a5c0; font-family: monospace; font-size: 28px;
    margin-bottom: 32px; letter-spacing: 0.1em;
  }
  .diff-buttons {
    display: flex; flex-direction: column; gap: 12px; align-items: center;
  }
  .diff-btn {
    font-family: monospace; font-size: 16px;
    background: #1a1a2e; color: #a5a5c0; border: 1px solid #3a3a55;
    padding: 12px 40px; cursor: pointer; border-radius: 4px;
    width: 260px; text-align: center;
    transition: background 0.15s, color 0.15s;
  }
  .diff-btn:hover, .diff-btn:focus {
    background: #2a2a4e; color: #e0e0f0; outline: none;
  }
  .diff-btn .diff-size {
    font-size: 11px; color: #5a5a7a; margin-top: 2px;
  }
</style>
</head>
<body>
<div id="difficulty-screen">
  <h1>Jigsawable Dungeon</h1>
  <div class="diff-buttons">
    <button class="diff-btn" data-diff="easy">Easy<div class="diff-size">27 x 16</div></button>
    <button class="diff-btn" data-diff="normal">Normal<div class="diff-size">54 x 32</div></button>
    <button class="diff-btn" data-diff="hard">Hard<div class="diff-size">108 x 64</div></button>
    <button class="diff-btn" data-diff="veryhard">Very Hard<div class="diff-size">162 x 96</div></button>
  </div>
</div>
<div id="info" style="display:none">Floor: 1 / 5</div>
<div id="game-wrap" style="display:none">
  <canvas id="cv"></canvas>
  <div id="side">
    <canvas id="minimap"></canvas>
    <div id="controls">
      <div class="ctrl-title">Move</div>
      <div class="ctrl-row">Arrow keys / WASD / hjkl</div>
      <div class="ctrl-title">Diagonal</div>
      <div class="ctrl-row">q e z c</div>
      <div class="ctrl-title">Dash</div>
      <div class="ctrl-row">Shift + direction</div>
    </div>
  </div>
</div>
<script>
// ============================================================
//  定数（調整用パラメーター）
// ============================================================
// 難易度設定
const DIFFICULTIES = {
  easy:     { w: 27,  h: 16, roomAttempts: 30,  minRoom: 4, maxRoom: 9  },
  normal:   { w: 54,  h: 32, roomAttempts: 60,  minRoom: 5, maxRoom: 13 },
  hard:     { w: 108, h: 64, roomAttempts: 120, minRoom: 5, maxRoom: 15 },
  veryhard: { w: 162, h: 96, roomAttempts: 180, minRoom: 6, maxRoom: 17 },
};

let MAP_W = 54;              // フロアマップ横マス数
let MAP_H = 32;              // フロアマップ縦マス数
const TOTAL_FLOORS = 5;      // 合計フロア数

const VIEW_W = 19;           // 画面表示 横マス数（奇数推奨）
const VIEW_H = 15;           // 画面表示 縦マス数（奇数推奨）
const TILE = 28;             // 1マスのピクセルサイズ

// ダンジョン生成パラメーター
let MIN_ROOM = 5;            // 部屋の最小辺
let MAX_ROOM = 13;           // 部屋の最大辺
let ROOM_ATTEMPTS = 60;      // 部屋配置試行回数

// タイルID
const T_WALL = 0;
const T_FLOOR = 1;
const T_STAIRS = 2;

// 色
const COL_WALL    = '#1a1a2e';
const COL_FLOOR   = '#2a2a3e';
const COL_STAIRS  = '#6366f1';
const COL_PLAYER  = '#f0e060';
const COL_FOG     = '#08080b';
const COL_VISITED = 'rgba(160,160,190,0.08)';

// ミニマップ
const MINI_SCALE = 2;       // ミニマップ 1マスあたりのピクセル

// ============================================================
//  状態
// ============================================================
let currentFloor = 1;
let map = [];           // 2D array [y][x]
let visible = [];       // 現在視界内
let revealed = [];      // 一度でも見たマス
let playerX = 0;
let playerY = 0;
let rooms = [];

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimap');
const mctx = miniCanvas.getContext('2d');
const info = document.getElementById('info');

// キャンバスサイズは startGame() で設定

// ============================================================
//  ダンジョン生成
// ============================================================
function initMap() {
  map = [];
  visible = [];
  revealed = [];
  rooms = [];
  for (let y = 0; y < MAP_H; y++) {
    map[y] = new Uint8Array(MAP_W);           // 全部壁(0)
    visible[y] = new Uint8Array(MAP_W);
    revealed[y] = new Uint8Array(MAP_W);
  }
}

function carveRoom(x, y, w, h) {
  for (let dy = 0; dy < h; dy++)
    for (let dx = 0; dx < w; dx++)
      map[y + dy][x + dx] = T_FLOOR;
}

// L字通路の向き選択用：通路が既存の床に隣接する数を数える
function countParallelAdj(x1, y1, x2, y2, hFirst) {
  let count = 0;
  let x, y;
  if (hFirst) {
    // 横セグメント (y1固定, x1→x2)
    for (x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
      if (map[y1][x] !== T_WALL) continue;
      if (y1 > 0 && map[y1 - 1][x] !== T_WALL) count++;
      if (y1 < MAP_H - 1 && map[y1 + 1][x] !== T_WALL) count++;
    }
    // 縦セグメント (x2固定, y1→y2)
    for (y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
      if (map[y][x2] !== T_WALL) continue;
      if (x2 > 0 && map[y][x2 - 1] !== T_WALL) count++;
      if (x2 < MAP_W - 1 && map[y][x2 + 1] !== T_WALL) count++;
    }
  } else {
    // 縦セグメント (x1固定, y1→y2)
    for (y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
      if (map[y][x1] !== T_WALL) continue;
      if (x1 > 0 && map[y][x1 - 1] !== T_WALL) count++;
      if (x1 < MAP_W - 1 && map[y][x1 + 1] !== T_WALL) count++;
    }
    // 横セグメント (y2固定, x1→x2)
    for (x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
      if (map[y2][x] !== T_WALL) continue;
      if (y2 > 0 && map[y2 - 1][x] !== T_WALL) count++;
      if (y2 < MAP_H - 1 && map[y2 + 1][x] !== T_WALL) count++;
    }
  }
  return count;
}

function carveCorridor(x1, y1, x2, y2) {
  // 既存の床との隣接が少ないL字向きを選択
  const hScore = countParallelAdj(x1, y1, x2, y2, true);
  const vScore = countParallelAdj(x1, y1, x2, y2, false);
  let x = x1, y = y1;
  if (hScore <= vScore) {
    while (x !== x2) { map[y][x] = T_FLOOR; x += x < x2 ? 1 : -1; }
    while (y !== y2) { map[y][x] = T_FLOOR; y += y < y2 ? 1 : -1; }
  } else {
    while (y !== y2) { map[y][x] = T_FLOOR; y += y < y2 ? 1 : -1; }
    while (x !== x2) { map[y][x] = T_FLOOR; x += x < x2 ? 1 : -1; }
  }
  map[y][x] = T_FLOOR;
}

// プレイヤー位置から階段まで到達可能か判定
function isReachable(sx, sy, tx, ty) {
  const visited = [];
  for (let y = 0; y < MAP_H; y++) visited[y] = new Uint8Array(MAP_W);
  const queue = [[sx, sy]];
  visited[sy][sx] = 1;
  while (queue.length > 0) {
    const [cx, cy] = queue.shift();
    if (cx === tx && cy === ty) return true;
    for (const [ddx, ddy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nx = cx + ddx;
      const ny = cy + ddy;
      if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && !visited[ny][nx] && map[ny][nx] !== T_WALL) {
        visited[ny][nx] = 1;
        queue.push([nx, ny]);
      }
    }
  }
  return false;
}

function generateDungeon() {
  for (let attempt = 0; attempt < 100; attempt++) {
    initMap();

    // 部屋を配置
    for (let i = 0; i < ROOM_ATTEMPTS; i++) {
      const w = MIN_ROOM + Math.floor(Math.random() * (MAX_ROOM - MIN_ROOM + 1));
      const h = MIN_ROOM + Math.floor(Math.random() * (MAX_ROOM - MIN_ROOM + 1));
      const x = 1 + Math.floor(Math.random() * (MAP_W - w - 2));
      const y = 1 + Math.floor(Math.random() * (MAP_H - h - 2));

      // 重複チェック（1マス余白込み）
      let overlap = false;
      for (const r of rooms) {
        if (x - 1 < r.x + r.w && x + w + 1 > r.x &&
            y - 1 < r.y + r.h && y + h + 1 > r.y) {
          overlap = true;
          break;
        }
      }
      if (overlap) continue;

      carveRoom(x, y, w, h);
      rooms.push({ x, y, w, h });
    }

    // 部屋同士を通路でつなぐ
    for (let i = 1; i < rooms.length; i++) {
      const a = rooms[i - 1];
      const b = rooms[i];
      const ax = a.x + Math.floor(a.w / 2);
      const ay = a.y + Math.floor(a.h / 2);
      const bx = b.x + Math.floor(b.w / 2);
      const by = b.y + Math.floor(b.h / 2);
      carveCorridor(ax, ay, bx, by);
    }

    // プレイヤーを最初の部屋の中央に配置
    const first = rooms[0];
    playerX = first.x + Math.floor(first.w / 2);
    playerY = first.y + Math.floor(first.h / 2);

    // 階段を最後の部屋の中央に配置
    const last = rooms[rooms.length - 1];
    const sx = last.x + Math.floor(last.w / 2);
    const sy = last.y + Math.floor(last.h / 2);
    map[sy][sx] = T_STAIRS;

    // 接続性チェック — 到達不能なら再生成
    if (isReachable(playerX, playerY, sx, sy)) return;
  }
}

// ============================================================
//  視界計算（簡易：プレイヤーがいる部屋 + 隣接通路）
// ============================================================
function computeVisibility() {
  // リセット
  for (let y = 0; y < MAP_H; y++) visible[y].fill(0);

  // プレイヤー周囲を常に見せる
  const SIGHT = 4;
  for (let dy = -SIGHT; dy <= SIGHT; dy++) {
    for (let dx = -SIGHT; dx <= SIGHT; dx++) {
      const nx = playerX + dx;
      const ny = playerY + dy;
      if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
        visible[ny][nx] = 1;
        revealed[ny][nx] = 1;
      }
    }
  }

  // プレイヤーが部屋内にいたらその部屋全体を可視化
  for (const r of rooms) {
    if (playerX >= r.x && playerX < r.x + r.w &&
        playerY >= r.y && playerY < r.y + r.h) {
      for (let dy = -1; dy <= r.h; dy++) {
        for (let dx = -1; dx <= r.w; dx++) {
          const rx = r.x + dx;
          const ry = r.y + dy;
          if (rx < 0 || rx >= MAP_W || ry < 0 || ry >= MAP_H) continue;
          // 部屋内は無条件、部屋外(周囲1マス)は床・階段のみ（出入口）
          const inside = dx >= 0 && dx < r.w && dy >= 0 && dy < r.h;
          if (inside || map[ry][rx] !== T_WALL) {
            visible[ry][rx] = 1;
            revealed[ry][rx] = 1;
          }
        }
      }
      break;
    }
  }
}

// ============================================================
//  描画
// ============================================================
function draw() {
  ctx.fillStyle = COL_FOG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // カメラオフセット（プレイヤー中心）
  const camX = playerX - Math.floor(VIEW_W / 2);
  const camY = playerY - Math.floor(VIEW_H / 2);

  for (let vy = 0; vy < VIEW_H; vy++) {
    for (let vx = 0; vx < VIEW_W; vx++) {
      const mx = camX + vx;
      const my = camY + vy;

      if (mx < 0 || mx >= MAP_W || my < 0 || my >= MAP_H) continue;

      const isVisible = visible[my][mx];
      const isRevealed = revealed[my][mx];
      const tile = map[my][mx];

      const px = vx * TILE;
      const py = vy * TILE;

      if (isVisible) {
        if (tile === T_WALL) {
          ctx.fillStyle = COL_WALL;
        } else if (tile === T_STAIRS) {
          ctx.fillStyle = COL_STAIRS;
        } else {
          ctx.fillStyle = COL_FLOOR;
        }
        ctx.fillRect(px, py, TILE, TILE);

        // 壁グリッド線
        if (tile === T_WALL) {
          ctx.strokeStyle = 'rgba(255,255,255,0.03)';
          ctx.strokeRect(px, py, TILE, TILE);
        }

        // 階段マーク
        if (tile === T_STAIRS) {
          ctx.fillStyle = '#fff';
          ctx.font = `${TILE - 4}px monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('▽', px + TILE / 2, py + TILE / 2 + 1);
        }
      } else if (isRevealed) {
        // 一度見た場所は薄く表示
        if (tile === T_WALL) {
          ctx.fillStyle = COL_WALL;
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = 'rgba(8,8,11,0.6)';
          ctx.fillRect(px, py, TILE, TILE);
        } else {
          ctx.fillStyle = COL_VISITED;
          ctx.fillRect(px, py, TILE, TILE);
          if (tile === T_STAIRS) {
            ctx.fillStyle = 'rgba(99,102,241,0.3)';
            ctx.fillRect(px, py, TILE, TILE);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = `${TILE - 4}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('▽', px + TILE / 2, py + TILE / 2 + 1);
          }
        }
      }
    }
  }

  // プレイヤー描画（常に画面中央）
  const ppx = Math.floor(VIEW_W / 2) * TILE;
  const ppy = Math.floor(VIEW_H / 2) * TILE;
  ctx.fillStyle = COL_PLAYER;
  ctx.fillRect(ppx + 4, ppy + 4, TILE - 8, TILE - 8);
  ctx.fillStyle = '#000';
  ctx.font = `${TILE - 10}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('@', ppx + TILE / 2, ppy + TILE / 2 + 1);

  // ミニマップ描画
  drawMinimap();
}

function drawMinimap() {
  const s = MINI_SCALE;
  mctx.fillStyle = COL_FOG;
  mctx.fillRect(0, 0, miniCanvas.width, miniCanvas.height);

  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (!revealed[y][x]) continue;
      const tile = map[y][x];
      if (tile === T_WALL) {
        mctx.fillStyle = '#2a2a3e';
      } else if (tile === T_STAIRS) {
        mctx.fillStyle = COL_STAIRS;
      } else {
        mctx.fillStyle = '#5a5a7a';
      }
      mctx.fillRect(x * s, y * s, s, s);
    }
  }

  // 階段位置（探索済みなら表示）
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (map[y][x] === T_STAIRS && revealed[y][x]) {
        mctx.fillStyle = '#e03040';
        const ss = Math.max(s, 3);
        mctx.fillRect(x * s - Math.floor(ss / 2), y * s - Math.floor(ss / 2), ss + 1, ss + 1);
      }
    }
  }

  // プレイヤー位置
  mctx.fillStyle = COL_PLAYER;
  const ps = Math.max(s, 3);
  mctx.fillRect(playerX * s - Math.floor(ps / 2), playerY * s - Math.floor(ps / 2), ps + 1, ps + 1);
}

// ============================================================
//  移動・入力
// ============================================================
function tryMove(dx, dy, dash) {
  if (!dash) {
    // 通常移動：1マス
    const nx = playerX + dx;
    const ny = playerY + dy;
    if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) return;
    if (map[ny][nx] === T_WALL) return;

    playerX = nx;
    playerY = ny;

    // 階段に乗ったら次のフロアへ
    if (map[ny][nx] === T_STAIRS) {
      descend();
    }
  } else {
    // ダッシュ：壁か階段にあたるまで進む
    while (true) {
      const nx = playerX + dx;
      const ny = playerY + dy;
      if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) break;
      if (map[ny][nx] === T_WALL) break;

      playerX = nx;
      playerY = ny;
      computeVisibility();

      if (map[ny][nx] === T_STAIRS) break;

      if (isInRoom(playerX, playerY)) {
        // 部屋内: 出入口マスと隣接する部屋内マスで停止
        if (isAdjacentToExitInRoom(playerX, playerY)) break;
      } else {
        // 通路: 交差点（分岐点）で停止（部屋内マスは分岐に数えない）
        let openCount = 0;
        for (let ddy = -1; ddy <= 1; ddy++) {
          for (let ddx = -1; ddx <= 1; ddx++) {
            if (ddx === 0 && ddy === 0) continue;
            if (ddx === -dx && ddy === -dy) continue;
            const cx = playerX + ddx;
            const cy = playerY + ddy;
            if (cx >= 0 && cx < MAP_W && cy >= 0 && cy < MAP_H && map[cy][cx] !== T_WALL && !isInRoom(cx, cy)) {
              openCount++;
            }
          }
        }
        if (openCount > 1) break;
      }
    }
  }

  computeVisibility();
  updateInfo();
  draw();
}

function isInRoom(x, y) {
  for (const r of rooms) {
    if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h) return true;
  }
  return false;
}

// 部屋内のマスで、上下左右に出入口マス（部屋外の床）が隣接しているか
function isAdjacentToExitInRoom(x, y) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [ddx, ddy] of dirs) {
    const ax = x + ddx;
    const ay = y + ddy;
    if (ax < 0 || ax >= MAP_W || ay < 0 || ay >= MAP_H) continue;
    if (map[ay][ax] === T_WALL) continue;
    if (!isInRoom(ax, ay)) return true;
  }
  return false;
}

function descend() {
  if (currentFloor >= TOTAL_FLOORS) {
    alert('全 ' + TOTAL_FLOORS + ' フロア踏破！おめでとう！');
    currentFloor = 1;
  } else {
    currentFloor++;
  }
  generateDungeon();
}

function updateInfo() {
  info.textContent = `Floor: ${currentFloor} / ${TOTAL_FLOORS}`;
}

// キーボード入力
document.addEventListener('keydown', (e) => {
  const dash = e.shiftKey;
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'k': case 'W': case 'K': e.preventDefault(); tryMove(0, -1, dash); break;
    case 'ArrowDown':  case 's': case 'j': case 'S': case 'J': e.preventDefault(); tryMove(0,  1, dash); break;
    case 'ArrowLeft':  case 'a': case 'h': case 'A': case 'H': e.preventDefault(); tryMove(-1, 0, dash); break;
    case 'ArrowRight': case 'd': case 'l': case 'D': case 'L': e.preventDefault(); tryMove( 1, 0, dash); break;
    // 斜め移動
    case 'q': case 'Q': e.preventDefault(); tryMove(-1, -1, dash); break;
    case 'e': case 'E': e.preventDefault(); tryMove( 1, -1, dash); break;
    case 'z': case 'Z': e.preventDefault(); tryMove(-1,  1, dash); break;
    case 'c': case 'C': e.preventDefault(); tryMove( 1,  1, dash); break;
  }
});

// ============================================================
//  難易度選択・初期化
// ============================================================
const diffScreen = document.getElementById('difficulty-screen');
const gameWrap = document.getElementById('game-wrap');

function startGame(diffKey) {
  const diff = DIFFICULTIES[diffKey];
  MAP_W = diff.w;
  MAP_H = diff.h;
  MIN_ROOM = diff.minRoom;
  MAX_ROOM = diff.maxRoom;
  ROOM_ATTEMPTS = diff.roomAttempts;

  // キャンバスサイズ更新
  canvas.width  = VIEW_W * TILE;
  canvas.height = VIEW_H * TILE;
  miniCanvas.width  = MAP_W * MINI_SCALE;
  miniCanvas.height = MAP_H * MINI_SCALE;

  // UI切替
  diffScreen.style.display = 'none';
  info.style.display = '';
  gameWrap.style.display = '';

  // ゲーム開始
  currentFloor = 1;
  generateDungeon();
  computeVisibility();
  updateInfo();
  draw();
}

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => startGame(btn.dataset.diff));
});
</script>
</body>
