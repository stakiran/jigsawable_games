<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jigsawable Maze</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080b; color: #a5a5c0;
    font-family: 'DM Mono', monospace;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
    user-select: none;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; border-bottom: 1px solid #3a3a55;
    flex-shrink: 0; z-index: 10;
  }
  .header h1 { font-size: 14px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; }
  .header-stats { display: flex; gap: 24px; font-size: 12px; color: #3a3a55; }
  .header-stats span { display: flex; align-items: center; gap: 6px; }
  .header-stats .val { color: #a5a5c0; font-weight: 500; }
  .game-area { flex: 1; position: relative; overflow: hidden; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .progress-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #3a3a55; z-index: 10; opacity: 0.5; }
  .progress-fill { height: 100%; background: #6366f1; transition: width 0.3s; }
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; border-top: 1px solid #3a3a55;
    flex-shrink: 0; font-size: 11px; z-index: 10;
  }
  .controls { display: flex; gap: 8px; }
  .btn {
    background: transparent; border: 1px solid #3a3a55; color: #a5a5c0;
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 14px;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
  }
  .btn:hover { border-color: #6366f1; color: #6366f1; }
  .btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }
  .hint { color: #3a3a55; }
  .hint kbd { display: inline-block; border: 1px solid #3a3a55; padding: 1px 5px; font-size: 10px; margin: 0 2px; }
  .overlay { display: none; position: absolute; inset: 0; background: rgba(8,8,11,0.92); z-index: 100; justify-content: center; align-items: center; flex-direction: column; gap: 16px; }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: 20px; font-weight: 300; letter-spacing: 0.2em; color: #34d399; }
  .overlay p { font-size: 12px; color: #3a3a55; }
  .gen-overlay { position: absolute; inset: 0; background: #08080b; z-index: 200; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 12px; transition: opacity 0.5s; }
  .gen-overlay.hidden { opacity: 0; pointer-events: none; }
  .gen-overlay p { font-size: 12px; letter-spacing: 0.1em; color: #3a3a55; }
  .spinner { width: 24px; height: 24px; border: 2px solid #3a3a55; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Jigsawable Maze</h1>
  <div class="header-stats">
    <span>探索率 <span class="val" id="pct">0.0%</span></span>
    <span>歩数 <span class="val" id="steps">0</span></span>
    <span>ノード <span class="val" id="nodeCount">0</span></span>
  </div>
</div>

<div class="game-area">
  <canvas id="canvas"></canvas>
  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
  <div class="overlay" id="overlay">
    <h2>COMPLETE</h2>
    <p>迷路を踏破しました</p>
    <button class="btn" onclick="newGame()">新しい迷路を生成</button>
  </div>
  <div class="gen-overlay" id="genOverlay">
    <div class="spinner"></div>
    <p>迷路を生成中…</p>
  </div>
</div>

<div class="bottom-bar">
  <div class="controls">
    <button class="btn active" id="btnExplore" onclick="setView('explore')">探索</button>
    <button class="btn" id="btnMap" onclick="setView('map')">俯瞰</button>
    <button class="btn" onclick="saveGame()">保存</button>
    <button class="btn" onclick="loadGame()">読込</button>
    <button class="btn" onclick="newGame()">新規</button>
  </div>
  <div class="hint">
    <kbd>Z</kbd> 反時計回り
    <kbd>X</kbd> 時計回り
    <kbd>Space</kbd> 移動
    <kbd>Tab</kbd> 表示切替
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  Irregular graph maze
//  1. Poisson-disk sampling for node positions
//  2. Delaunay triangulation for adjacency
//  3. Random spanning tree = maze
// ═══════════════════════════════════════════════════════

const WORLD_SIZE = 3000;  // virtual world coordinates
const MIN_DIST = 45;      // Poisson disk minimum distance
const SAVE_KEY = 'jigsawable_maze_v4';

let nodes = [];       // [{x, y}]
let adj = [];         // adj[i] = [j, ...] — full Delaunay adjacency
let treeAdj = [];     // treeAdj[i] = Set(j) — spanning tree edges
let visitStep = [];   // step# when node first visited (0 = unvisited)
let curNode = 0;
let goalNode = 0;
let stepCount = 0, visitedCount = 0;
let viewMode = 'explore', completed = false;

const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');

function resize() {
  const a = cvs.parentElement;
  cvs.width = a.clientWidth * devicePixelRatio;
  cvs.height = a.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  render();
}
window.addEventListener('resize', resize);

// ─── Poisson Disk Sampling ───
function poissonDisk(w, h, r) {
  const cellSize = r / Math.SQRT2;
  const gridW = Math.ceil(w / cellSize);
  const gridH = Math.ceil(h / cellSize);
  const grid = new Array(gridW * gridH).fill(-1);
  const points = [];
  const active = [];
  const k = 30;

  function gridIdx(x, y) {
    return Math.floor(x / cellSize) + Math.floor(y / cellSize) * gridW;
  }

  // Seed
  const sx = w * 0.1 + Math.random() * w * 0.8;
  const sy = h * 0.1 + Math.random() * h * 0.8;
  points.push({ x: sx, y: sy });
  grid[gridIdx(sx, sy)] = 0;
  active.push(0);

  while (active.length > 0) {
    const ai = Math.floor(Math.random() * active.length);
    const pi = active[ai];
    const p = points[pi];
    let found = false;

    for (let t = 0; t < k; t++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = r + Math.random() * r;
      const nx = p.x + Math.cos(angle) * dist;
      const ny = p.y + Math.sin(angle) * dist;

      if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;

      const gi = Math.floor(nx / cellSize);
      const gj = Math.floor(ny / cellSize);
      let ok = true;

      outer:
      for (let di = -2; di <= 2; di++) {
        for (let dj = -2; dj <= 2; dj++) {
          const ni = gi + di, nj = gj + dj;
          if (ni < 0 || ni >= gridW || nj < 0 || nj >= gridH) continue;
          const idx = grid[ni + nj * gridW];
          if (idx === -1) continue;
          const op = points[idx];
          const dx = op.x - nx, dyy = op.y - ny;
          if (dx * dx + dyy * dyy < r * r) { ok = false; break outer; }
        }
      }

      if (ok) {
        const newIdx = points.length;
        points.push({ x: nx, y: ny });
        grid[gridIdx(nx, ny)] = newIdx;
        active.push(newIdx);
        found = true;
      }
    }

    if (!found) active.splice(ai, 1);
  }

  return points;
}

// ─── Delaunay Triangulation (Bowyer-Watson) ───
function delaunay(pts) {
  // Super-triangle
  const margin = WORLD_SIZE * 10;
  const st = [
    { x: -margin, y: -margin },
    { x: margin * 3, y: -margin },
    { x: 0, y: margin * 3 }
  ];
  const allPts = [...pts, ...st];
  const n = pts.length;
  const si = [n, n + 1, n + 2];

  let triangles = [{ a: si[0], b: si[1], c: si[2] }];

  for (let i = 0; i < n; i++) {
    const p = allPts[i];
    const bad = [];
    const edges = [];

    for (let t = 0; t < triangles.length; t++) {
      const tri = triangles[t];
      if (inCircumcircle(p, allPts[tri.a], allPts[tri.b], allPts[tri.c])) {
        bad.push(t);
        edges.push([tri.a, tri.b], [tri.b, tri.c], [tri.c, tri.a]);
      }
    }

    // Remove bad triangles (reverse order)
    bad.sort((a, b) => b - a);
    for (const bi of bad) triangles.splice(bi, 1);

    // Find boundary edges (appear exactly once)
    const edgeMap = new Map();
    for (const [a, b] of edges) {
      const key = a < b ? `${a}-${b}` : `${b}-${a}`;
      edgeMap.set(key, (edgeMap.get(key) || 0) + 1);
    }
    for (const [a, b] of edges) {
      const key = a < b ? `${a}-${b}` : `${b}-${a}`;
      if (edgeMap.get(key) === 1) {
        triangles.push({ a: i, b: a, c: b });
      }
    }
  }

  // Extract adjacency, ignoring super-triangle vertices
  const adjacency = Array.from({ length: n }, () => new Set());
  for (const tri of triangles) {
    const vs = [tri.a, tri.b, tri.c].filter(v => v < n);
    for (let i = 0; i < vs.length; i++)
      for (let j = i + 1; j < vs.length; j++) {
        adjacency[vs[i]].add(vs[j]);
        adjacency[vs[j]].add(vs[i]);
      }
  }

  return adjacency.map(s => [...s]);
}

function inCircumcircle(p, a, b, cc) {
  const ax = a.x - p.x, ay = a.y - p.y;
  const bx = b.x - p.x, by = b.y - p.y;
  const cx = cc.x - p.x, cy = cc.y - p.y;
  const det = ax * (by * (cx*cx+cy*cy) - cy * (bx*bx+by*by))
            - ay * (bx * (cx*cx+cy*cy) - cx * (bx*bx+by*by))
            + (ax*ax+ay*ay) * (bx * cy - by * cx);
  return det > 0;
}

// ─── Random Spanning Tree (Wilson's algorithm for uniform spanning tree) ───
function randomSpanningTree(n, adjacency) {
  const tree = Array.from({ length: n }, () => new Set());
  const inTree = new Uint8Array(n);

  // Start with node 0
  inTree[0] = 1;
  let remaining = n - 1;

  while (remaining > 0) {
    // Pick random node not in tree
    let start;
    do { start = Math.floor(Math.random() * n); } while (inTree[start]);

    // Random walk until hitting tree
    const path = [start];
    const visited = new Map(); // node -> index in path
    visited.set(start, 0);
    let cur = start;

    while (!inTree[cur]) {
      const neighbors = adjacency[cur];
      const next = neighbors[Math.floor(Math.random() * neighbors.length)];

      if (visited.has(next)) {
        // Loop erase
        const loopStart = visited.get(next);
        for (let i = loopStart + 1; i < path.length; i++) {
          visited.delete(path[i]);
        }
        path.length = loopStart + 1;
        cur = next;
      } else {
        path.push(next);
        visited.set(next, path.length - 1);
        cur = next;
      }
    }

    // Add path to tree
    for (let i = 0; i < path.length - 1; i++) {
      const a = path[i], b = path[i + 1];
      tree[a].add(b);
      tree[b].add(a);
      if (!inTree[a]) { inTree[a] = 1; remaining--; }
    }
  }

  return tree;
}

// ─── Generate ───
function generate() {
  nodes = poissonDisk(WORLD_SIZE, WORLD_SIZE, MIN_DIST);
  const totalNodes = nodes.length;
  document.getElementById('nodeCount').textContent = totalNodes.toLocaleString();

  adj = delaunay(nodes);
  treeAdj = randomSpanningTree(totalNodes, adj);

  visitStep = new Int32Array(totalNodes);

  // Start: closest to top-left
  // Goal: closest to bottom-right
  let minD0 = Infinity, minDG = Infinity;
  curNode = 0; goalNode = 0;
  for (let i = 0; i < totalNodes; i++) {
    const d0 = nodes[i].x * nodes[i].x + nodes[i].y * nodes[i].y;
    const dg = (nodes[i].x - WORLD_SIZE) ** 2 + (nodes[i].y - WORLD_SIZE) ** 2;
    if (d0 < minD0) { minD0 = d0; curNode = i; }
    if (dg < minDG) { minDG = dg; goalNode = i; }
  }

  stepCount = 1;
  visitedCount = 1;
  visitStep[curNode] = 1;
  completed = false;
  document.getElementById('overlay').classList.remove('show');
}

// ─── Movement: select neighbor then move ───
let selectedNeighborIdx = 0; // index into treeAdj[curNode] array

function getNeighborList() {
  const cur = nodes[curNode];
  const list = [...treeAdj[curNode]];
  // Sort by angle for consistent ordering
  list.sort((a, b) => {
    const aa = Math.atan2(nodes[a].y - cur.y, nodes[a].x - cur.x);
    const ba = Math.atan2(nodes[b].y - cur.y, nodes[b].x - cur.x);
    return aa - ba;
  });
  return list;
}

function cycleNeighbor(dir) {
  const list = getNeighborList();
  if (!list.length) return;
  selectedNeighborIdx = ((selectedNeighborIdx + dir) % list.length + list.length) % list.length;
  render();
}

function moveToSelected() {
  if (completed) return;
  const list = getNeighborList();
  if (!list.length) return;
  if (selectedNeighborIdx >= list.length) selectedNeighborIdx = 0;

  const target = list[selectedNeighborIdx];
  const prevNode = curNode;
  curNode = target;
  stepCount++;
  if (!visitStep[curNode]) visitedCount++;
  visitStep[curNode] = stepCount;

  // 進行方向(prevNode→curNode)に最も近い隣接ノードを自動選択
  const newList = getNeighborList();
  if (newList.length > 0) {
    const dx = nodes[curNode].x - nodes[prevNode].x;
    const dy = nodes[curNode].y - nodes[prevNode].y;
    const moveAngle = Math.atan2(dy, dx);
    let bestIdx = 0, bestDiff = Infinity;
    for (let i = 0; i < newList.length; i++) {
      const nb = nodes[newList[i]];
      const a = Math.atan2(nb.y - nodes[curNode].y, nb.x - nodes[curNode].x);
      let diff = Math.abs(a - moveAngle);
      if (diff > Math.PI) diff = 2 * Math.PI - diff;
      if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    }
    selectedNeighborIdx = bestIdx;
  } else {
    selectedNeighborIdx = 0;
  }

  if (curNode === goalNode) {
    completed = true;
    document.getElementById('overlay').classList.add('show');
  }
  render();
}

// ─── Render ───
function render() {
  if (!nodes.length) return;
  const W = cvs.width / devicePixelRatio;
  const H = cvs.height / devicePixelRatio;
  ctx.fillStyle = '#08080b';
  ctx.fillRect(0, 0, W, H);
  viewMode === 'explore' ? drawExplore(W, H) : drawMap(W, H);
  updateUI();
}

function drawExplore(W, H) {
  const cur = nodes[curNode];
  // Scale: how many world units fit on screen
  const viewRadius = 350;
  const scale = Math.min(W, H) / 2 / viewRadius;
  const ox = W / 2 - cur.x * scale;
  const oy = H / 2 - cur.y * scale;

  // Visible range (with margin)
  const margin = 80;
  const xMin = cur.x - viewRadius - margin;
  const xMax = cur.x + viewRadius + margin;
  const yMin = cur.y - viewRadius - margin;
  const yMax = cur.y + viewRadius + margin;

  // Draw tree edges
  const drawn = new Set();
  for (let i = 0; i < nodes.length; i++) {
    const ni = nodes[i];
    if (ni.x < xMin || ni.x > xMax || ni.y < yMin || ni.y > yMax) continue;
    for (const j of treeAdj[i]) {
      const key = i < j ? `${i}-${j}` : `${j}-${i}`;
      if (drawn.has(key)) continue;
      drawn.add(key);
      const nj = nodes[j];

      const sv1 = visitStep[i], sv2 = visitStep[j];
      if (sv1 > 0 && sv2 > 0) {
        const newer = Math.max(sv1, sv2);
        const age = (stepCount - newer) / Math.max(stepCount, 1);
        const a = Math.max(0.12, 0.55 - age * 0.35);
        ctx.strokeStyle = `rgba(55,48,163,${a})`;
        ctx.lineWidth = 1.5;
      } else {
        ctx.strokeStyle = 'rgba(50,50,90,0.7)';
        ctx.lineWidth = 1.0;
      }

      ctx.beginPath();
      ctx.moveTo(ni.x * scale + ox, ni.y * scale + oy);
      ctx.lineTo(nj.x * scale + ox, nj.y * scale + oy);
      ctx.stroke();
    }
  }

  // Draw nodes
  for (let i = 0; i < nodes.length; i++) {
    const ni = nodes[i];
    if (ni.x < xMin || ni.x > xMax || ni.y < yMin || ni.y > yMax) continue;
    const sx = ni.x * scale + ox;
    const sy = ni.y * scale + oy;

    if (i === goalNode) {
      ctx.fillStyle = 'rgba(52,211,153,0.5)';
      ctx.beginPath();
      ctx.arc(sx, sy, 8, 0, Math.PI * 2);
      ctx.fill();
    }

    const sv = visitStep[i];
    if (sv > 0) {
      const age = (stepCount - sv) / Math.max(stepCount, 1);
      const a = Math.max(0.3, 1.0 - age * 0.6);
      ctx.fillStyle = `rgba(99,102,241,${a})`;
    } else {
      ctx.fillStyle = '#2e2e52';
    }
    ctx.beginPath();
    ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Highlight edges from current node
  const neighborList = getNeighborList();
  const psx = cur.x * scale + ox;
  const psy = cur.y * scale + oy;

  for (let idx = 0; idx < neighborList.length; idx++) {
    const ni = neighborList[idx];
    const nb = nodes[ni];
    const nsx = nb.x * scale + ox;
    const nsy = nb.y * scale + oy;
    const isSelected = idx === selectedNeighborIdx;
    ctx.strokeStyle = isSelected ? 'rgba(232,232,255,0.6)' : 'rgba(200,200,255,0.15)';
    ctx.lineWidth = isSelected ? 3 : 1.5;
    ctx.beginPath();
    ctx.moveTo(psx, psy);
    ctx.lineTo(nsx, nsy);
    ctx.stroke();

    // Arrowhead on selected edge — placed at 60% along the edge
    if (isSelected) {
      const dx = nsx - psx, dy = nsy - psy;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len > 20) {
        const ux = dx / len, uy = dy / len;
        const midX = psx + dx * 0.6;
        const midY = psy + dy * 0.6;
        const arrowSize = 14;
        const perpX = -uy, perpY = ux;
        ctx.fillStyle = '#e8e8ff';
        ctx.beginPath();
        ctx.moveTo(midX + ux * arrowSize, midY + uy * arrowSize);
        ctx.lineTo(midX + perpX * arrowSize * 0.5, midY + perpY * arrowSize * 0.5);
        ctx.lineTo(midX - perpX * arrowSize * 0.5, midY - perpY * arrowSize * 0.5);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  // Highlight neighbor nodes
  for (let idx = 0; idx < neighborList.length; idx++) {
    const ni = neighborList[idx];
    const nb = nodes[ni];
    const nsx = nb.x * scale + ox;
    const nsy = nb.y * scale + oy;
    const isSelected = idx === selectedNeighborIdx;
    if (isSelected) {
      ctx.fillStyle = 'rgba(232,232,255,0.8)';
      ctx.shadowColor = 'rgba(232,232,255,0.5)';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(nsx, nsy, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = 'rgba(200,200,255,0.25)';
      ctx.beginPath();
      ctx.arc(nsx, nsy, 3.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Player
  ctx.fillStyle = '#e8e8ff';
  ctx.shadowColor = 'rgba(232,232,255,0.5)';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(psx, psy, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Vignette
  const g = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.2, W/2, H/2, Math.min(W,H)*0.58);
  g.addColorStop(0, 'rgba(8,8,11,0)');
  g.addColorStop(1, 'rgba(8,8,11,0.8)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawMap(W, H) {
  const pad = 30;
  const scale = Math.min((W - pad*2) / WORLD_SIZE, (H - pad*2) / WORLD_SIZE);
  const ox = (W - WORLD_SIZE * scale) / 2;
  const oy = (H - WORLD_SIZE * scale) / 2;

  // Edges
  const drawn = new Set();
  for (let i = 0; i < nodes.length; i++) {
    const ni = nodes[i];
    for (const j of treeAdj[i]) {
      const key = i < j ? `${i}-${j}` : `${j}-${i}`;
      if (drawn.has(key)) continue;
      drawn.add(key);
      const nj = nodes[j];

      const sv1 = visitStep[i], sv2 = visitStep[j];
      if (sv1 > 0 && sv2 > 0) {
        const newer = Math.max(sv1, sv2);
        const age = (stepCount - newer) / Math.max(stepCount, 1);
        ctx.strokeStyle = `rgba(55,48,163,${Math.max(0.1, 0.5 - age * 0.3)})`;
        ctx.lineWidth = 0.8;
      } else {
        ctx.strokeStyle = 'rgba(45,45,80,0.6)';
        ctx.lineWidth = 0.5;
      }
      ctx.beginPath();
      ctx.moveTo(ni.x * scale + ox, ni.y * scale + oy);
      ctx.lineTo(nj.x * scale + ox, nj.y * scale + oy);
      ctx.stroke();
    }
  }

  // Nodes
  for (let i = 0; i < nodes.length; i++) {
    const ni = nodes[i];
    const sx = ni.x * scale + ox, sy = ni.y * scale + oy;
    const sv = visitStep[i];
    if (sv > 0) {
      const age = (stepCount - sv) / Math.max(stepCount, 1);
      ctx.fillStyle = `rgba(79,70,229,${Math.max(0.2, 0.7 - age * 0.4)})`;
    } else {
      ctx.fillStyle = 'rgba(46,46,82,0.6)';
    }
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Goal
  ctx.fillStyle = 'rgba(52,211,153,0.7)';
  ctx.beginPath();
  ctx.arc(nodes[goalNode].x * scale + ox, nodes[goalNode].y * scale + oy, 4, 0, Math.PI * 2);
  ctx.fill();

  // Player
  ctx.fillStyle = '#e8e8ff';
  ctx.beginPath();
  ctx.arc(nodes[curNode].x * scale + ox, nodes[curNode].y * scale + oy, 3, 0, Math.PI * 2);
  ctx.fill();
}

function updateUI() {
  const total = nodes.length;
  const pct = total ? ((visitedCount / total) * 100).toFixed(1) : '0.0';
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('steps').textContent = stepCount.toLocaleString();
  document.getElementById('progress').style.width = pct + '%';
}

// ─── Input ───
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'z': case 'Z': e.preventDefault(); cycleNeighbor(-1); break;
    case 'x': case 'X': e.preventDefault(); cycleNeighbor(1); break;
    case ' ': e.preventDefault(); moveToSelected(); break;
    case 'Tab': e.preventDefault(); setView(viewMode === 'explore' ? 'map' : 'explore'); break;
  }
});

function setView(m) {
  viewMode = m;
  document.getElementById('btnExplore').classList.toggle('active', m === 'explore');
  document.getElementById('btnMap').classList.toggle('active', m === 'map');
  render();
}

// ─── Save / Load ───
function saveGame() {
  try {
    const data = {
      nodes: nodes.map(n => [Math.round(n.x*10)/10, Math.round(n.y*10)/10]),
      tree: treeAdj.map(s => [...s]),
      vis: Array.from(visitStep),
      cur: curNode, goal: goalNode,
      steps: stepCount, vc: visitedCount,
      done: completed, ts: Date.now()
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showToast('保存しました');
  } catch(e) { showToast('保存に失敗しました'); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) { showToast('セーブデータがありません'); return; }
    const d = JSON.parse(raw);
    nodes = d.nodes.map(([x, y]) => ({ x, y }));
    treeAdj = d.tree.map(arr => new Set(arr));
    visitStep = new Int32Array(d.vis);
    curNode = d.cur; goalNode = d.goal;
    stepCount = d.steps; visitedCount = d.vc;
    completed = d.done || false;
    document.getElementById('nodeCount').textContent = nodes.length.toLocaleString();
    document.getElementById('genOverlay').classList.add('hidden');
    if (completed) document.getElementById('overlay').classList.add('show');
    render();
    showToast('読み込みました');
  } catch(e) { showToast('読み込みに失敗しました'); }
}

function newGame() {
  document.getElementById('genOverlay').classList.remove('hidden');
  document.getElementById('overlay').classList.remove('show');
  setTimeout(() => { generate(); document.getElementById('genOverlay').classList.add('hidden'); render(); }, 50);
}

function showToast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div'); el.id = 'toast';
    el.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#a5a5c0;padding:8px 20px;font-family:"DM Mono",monospace;font-size:11px;border:1px solid #3a3a55;z-index:300;transition:opacity 0.3s;letter-spacing:0.05em;';
    document.body.appendChild(el);
  }
  el.textContent = msg; el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 1500);
}

window.addEventListener('load', () => { resize(); localStorage.getItem(SAVE_KEY) ? loadGame() : newGame(); });
</script>
